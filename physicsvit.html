 the ends for open pipe).","**Closed Pipe (closed at one end):** Node at closed end, antinode at open end. Only ODD harmonics are present: $f_n = nv/(4L)$, $n = 1, 3, 5, \\ldots$","Fundamental: $f_1 = v/(4L)$, wavelength = $4L$. The first overtone is the 3rd harmonic (2nd harmonic is absent).","**String instruments** (guitar, violin): String fixed at both ends. Same harmonic series as open pipe: $f_n = nv/(2L)$."],formulas:[{label:"Open organ pipe",latex:"$$f = \\frac{nv}{2L}, \\quad n = 1, 2, 3, \\ldots$$"},{label:"Closed organ pipe",latex:"$$f = \\frac{nv}{4L}, \\quad n = 1, 3, 5, \\ldots$$"},{label:"Open pipe overtones ratio",latex:"$$f_1 : f_2 : f_3 = 1 : 2 : 3$$"},{label:"Closed pipe overtones ratio",latex:"$$f_1 : f_3 : f_5 = 1 : 3 : 5$$"}],tips:["A closed pipe of length L has the same fundamental frequency as an open pipe of length L/2.","2nd, 4th, 6th harmonics are ABSENT in a closed pipe — only odd harmonics exist.","End correction: effective length = actual length + 0.6r (r = radius of pipe)."]},{id:"doppler-effect",title:"Doppler Effect",content:["The **Doppler Effect** is the apparent change in frequency of a wave due to the relative motion between the source and the observer.","When source and observer approach each other, apparent frequency increases. When they move apart, it decreases.","**General formula:** $f' = \\frac{(V \\pm v_L)}{(V \\mp v_S)} f$ where $V$ = speed of sound, $v_L$ = speed of listener, $v_S$ = speed of source.","**Sign convention:**","- Upper sign (+) in numerator: listener moves TOWARD source","- Lower sign (−) in numerator: listener moves AWAY from source","- Upper sign (+) in denominator: source moves AWAY from listener","- Lower sign (−) in denominator: source moves TOWARD listener","**Important:** If source or observer speed exceeds sound speed ($V$), shock waves are formed (supersonic). Mach number = $v/V$. Mach 1 = speed of sound."],formulas:[{label:"Doppler Effect (general)",latex:"$$f' = \\frac{(V \\pm v_L)}{(V \\mp v_S)} f$$"},{label:"Source moving toward observer",latex:"$$f' = \\frac{V}{V - v_S} f$$"},{label:"Observer moving toward source",latex:"$$f' = \\frac{V + v_L}{V} f$$"},{label:"Both moving toward each other",latex:"$$f' = \\frac{V + v_L}{V - v_S} f$$"}],tips:["Use the memory aid: 'Approach = Higher frequency'. When approaching, the formula gives higher f'.","If both source and observer are at rest but the medium moves: treat like source moving opposite to medium.","VITEEE often tests: what happens when source moves vs. observer moves — the formulas are different!"]}]}];function Lg(u){return Ht.find(s=>s.slug===u)}function Hg(u){const s=Ht.findIndex(f=>f.slug===u);return{prev:s>0?Ht[s-1]:void 0,next:s<Ht.length-1?Ht[s+1]:void 0}}const Bg={Ruler:du,Move:Xm,ArrowRight:tr,Zap:jg,Globe:$g,RotateCw:qg,Activity:mg,Radio:Rg};function Gg(){return x.jsxs("div",{className:"max-w-6xl mx-auto",children:[x.jsxs("section",{className:"px-3 sm:px-6 pt-8 sm:pt-14 pb-6 sm:pb-8",children:[x.jsxs("div",{className:"max-w-2xl",children:[x.jsxs("div",{className:"inline-flex items-center gap-2 px-3 py-1 rounded-full text-[11px] sm:text-xs font-semibold mb-3 sm:mb-4",style:{backgroundColor:"rgba(99,102,241,0.15)",color:"#818cf8"},children:[x.jsx(Sg,{size:13}),"Complete VITEEE Preparation"]}),x.jsxs("h2",{className:"text-2xl sm:text-4xl font-extrabold text-white tracking-tight leading-tight",children:["Master Physics for",x.jsx("br",{}),x.jsx("span",{className:"bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent",children:"VITEEE 2025"})]}),x.jsx("p",{className:"mt-2.5 sm:mt-3 text-sm sm:text-base text-slate-400 leading-relaxed max-w-lg",children:"Comprehensive notes covering 8 core topics with key concepts, essential formulas (rendered in LaTeX), and exam-focused tips. Each topic has its own detailed page."})]}),x.jsxs("div",{className:"mt-6 sm:mt-8 grid grid-cols-4 gap-0 rounded-2xl overflow-hidden border",style:{backgroundColor:"var(--color-dark-card)",borderColor:"var(--

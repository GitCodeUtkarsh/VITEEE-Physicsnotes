nter",children:"Comprehensive VITEEE Physics Notes • 8 Topics • 50+ Formulas"}),x.jsxs("p",{className:"text-[11px] sm:text-xs text-slate-600",children:["Made with focus by ",x.jsx("span",{className:"text-indigo-400 font-medium",children:"Utkarsh"})]})]})})})]})}const Ht=[{slug:"unit-and-dimensions",title:"Unit and Dimensions",description:"Physical quantities, SI units, dimensional analysis, errors & measurements for VITEEE.",icon:"Ruler",color:"#6366f1",sections:[{id:"physical-quantities-units",title:"Physical Quantities & Units",content:["A physical quantity is a quantity that can be measured and expressed with a numerical value and a unit. Physical quantities are of two types: fundamental (base) quantities and derived quantities.","There are three major systems of units:","**SI (International System)** — The most widely used system with 7 base units. It is the modern form of the metric system.","**CGS System** — Centimetre-Gram-Second system, used for smaller scale measurements.","**MKS System** — Metre-Kilogram-Second system, which forms the basis of the SI system for mechanics.","In SI, the seven base quantities are: Length (metre, m), Mass (kilogram, kg), Time (second, s), Electric Current (ampere, A), Thermodynamic Temperature (kelvin, K), Amount of Substance (mole, mol), and Luminous Intensity (candela, cd)."],formulas:[],tips:["VITEEE frequently asks about SI base quantities — memorize all 7 with their units and symbols.","Supplementary units (radian and steradian) are now considered dimensionless derived units."]},{id:"fundamental-quantities-table",title:"Fundamental Quantities Table",content:["The following table lists the 7 base quantities of the SI system along with their symbols, dimensional formulas, and SI units:","| Quantity | Symbol | Dimension | SI Unit | Unit Symbol |","| Length | l, x, r | [L] | metre | m |","| Mass | m | [M] | kilogram | kg |","| Time | t | [T] | second | s |","| Temperature | T | [K] or [Θ] | kelvin | K |","| Electric Current | I | [I] | ampere | A |","| Amount of Substance | n | [N] or [mol] | mole | mol |","| Luminous Intensity | Iv | [J] | candela | cd |","Note: Angle (plane angle — radian, solid angle — steradian) are supplementary/dimensionless derived units."],formulas:[],tips:["Remember: kilogram (kg) is the base unit of mass, NOT gram. This is a common trick question.","Temperature dimension is written as [K] or [Θ] — both are accepted conventions."]},{id:"dimensional-formula",title:"Dimensional Formula",content:["The dimensional formula of a physical quantity is an expression that shows how and which of the base quantities represent that quantity. It is written by enclosing the symbols of base quantities in square brackets [ ] raised to appropriate powers.","**Method to write dimensional formula (4 steps):**","1. Identify the physical quantity and express it in terms of other known quantities.","2. Write the dimensional formula of each of these known quantities.","3. Substitute the dimensional formulas into the expression.","4. Simplify by combining like terms using algebraic rules for exponents.","For example, the dimensional formula of Force: F = ma = m × (v/t) = m × (L/T)/T = m × L/T² = [MLT⁻²]","Dimensional formula does NOT give the numerical value or any dimensionless constants."],formulas:[{label:"Velocity",latex:"$$[v] = [LT^{-1}]$$"},{label:"Acceleration",latex:"$$[a] = [LT^{-2}]$$"},{label:"Force",latex:"$$[F] = [MLT^{-2}]$$"},{label:"Work/Energy",latex:"$$[W] = [ML^2T^{-2}]$$"},{label:"Power",latex:"$$[P] = [ML^2T^{-3}]$$"}],tips:["In VITEEE, dimensional formula questions often test if you can identify the correct dimensions of derived quantities.","Angle is dimensionless [M⁰L⁰T⁰] — it's a ratio of arc length to radius."]},{id:"characteristics-of-dimensions",title:"Characteristics of Dimensions",content:["The following 5 rules govern dimensional analysis:","1. **Quantities with same dimensions can be added or subtracted** (Principle of Homogeneity). For example, you can add 5 m and 3 m, but not 5 m and 3 kg.","2. **Physical quantities with different dimensions can be multiplied or divided.** For example, velocity × time = displacement — dimensions are consistent.","3. **Dimensional constants** have dimensions (e.g., Planck's constant h, gravitational constant G), while **dimensionless constants** do not (e.g., π, e, pure numbers like 2, ½).","4. **Trigonometric, exponential, and logarithmic functions** have dimensionless arguments. sin θ is valid only if θ is dimensionless (radians).","5. **A valid physical equation must be dimensionally homogeneous** on both sides — this is the Principle of Homogeneity, used to check the correctness of equations."],formulas:[],tips:["Use dimensional analysis to quickly eliminate wrong options in VITEEE MCQs.","Dimensional analysis cannot determine dimensionless constants — it can only verify dimensional correctness."]},{id:"principle-of-homogeneity",title:"Principle of Homogeneity",content:["The Principle of Homogeneity states that in a correctly formulated physical equation, the dimensions of each term on both sides of the equation must be the same. This principle is used to:","1. **Check the correctness of an equation** — If dimensions don't match, the equation is wrong.","2. **Derive relationships** between physical quantities using dimensional analysis.","3. **Convert units** from one system to another.","Example: Check $s = ut + \\frac{1}{2}at^2$. LHS = [L], RHS = [LT⁻¹][T] + [LT⁻²][T²] = [L] + [L] = [L]. ✓","**Limitations:** Cannot determine dimensionless constants, cannot verify equations with trigonometric/logarithmic functions, cannot distinguish between quantities with same dimensions (e.g., work and torque both have [ML²T⁻²])."],formulas:[],tips:["VITEEE often asks 'which equation is dimensionally correct' — use homogeneity to quickly find the answer.","Work and Torque have the same dimensions [ML²T⁻²] but are different physical quantities. Dimensional analysis cannot distinguish between them."]},{id:"mechanical-derived-quantities",title:"Mechanical Derived Quantities",content:["Here are the important mechanical derived quantities with their dimensional formulas:","| Quantity | Expression | Dimensional Formula |","| Area | Length × Breadth | [L²] |","| Volume | Length × Breadth × Height | [L³] |","| Density | Mass / Volume | [ML⁻³] |","| Speed/Velocity | Distance / Time | [LT⁻¹] |","| Acceleration | Velocity / Time | [LT⁻²] |","| Force | Mass × Acceleration | [MLT⁻²] |","| Momentum | Mass × Velocity | [MLT⁻¹] |","| Impulse | Force × Time | [MLT⁻¹] |","| Work/Energy | Force × Distance | [ML²T⁻²] |","| Power | Work / Time | [ML²T⁻³] |","| Pressure | Force / Area | [ML⁻¹T⁻²] |","| Frequency | 1 / Time Period | [T⁻¹] |","| Angular Velocity | Angle / Time | [T⁻¹] |","| Surface Tension | Force / Length | [MT⁻²] |","| Coefficient of Viscosity | Force × Time / Area | [ML⁻¹T⁻¹] |","| Gravitational Constant | Force × r² / (m₁m₂) | [M⁻¹L³T⁻²] |","| Universal Gas Constant | PV / nT | [ML²T⁻²K⁻¹mol⁻¹] |","| Planck's Constant | Energy / Frequency | [ML²T⁻¹] |","| Thermal Conductivity | Energy / (Length × Time × Temp) | [MLT⁻³K⁻¹] |","| Boltzmann Constant | Energy / Temperature | [ML²T⁻²K⁻¹] |","| Entropy | Energy / Temperature | [ML²T⁻²K⁻¹] |","| Specific Heat | Energy / (Mass × Temp) | [L²T⁻²K⁻¹] |","| Latent Heat | Energy / Mass | [L²T⁻²] |"],formulas:[],tips:["Focus on memorizing the dimensional formulas of Force, Work, Power, Pressure, and Planck's Constant — these are most frequently tested.","Notice: Frequency and Angular Velocity both have [T⁻¹] but they are physically different quantities."]},{id:"electrical-derived-quantities",title:"Electrical Derived Quantities",content:["Key electrical derived quantities with their dimensional formulas:","| Quantity | Expression | Dimensional Formula |","| Electric Charge | Current × Time | [AT] |","| Electric Potential | Work / Charge | [ML²T⁻³A⁻¹] |","| Electric Field | Force / Charge | [MLT⁻³A⁻¹] |","| Capacitance | Charge / Potential | [M⁻¹L⁻²T⁴A²] |","| Resistance | Potential / Current | [ML²T⁻³A⁻²] |","| Resistivity | Resistance × Area / Length | [ML³T⁻³A⁻²] |","| Magnetic Field | Force / (Current × Length) | [MT⁻²A⁻¹] |","| Magnetic Flux | Magnetic Field × Area | [ML²T⁻²A⁻¹] |","| Inductance | Magnetic Flux / Current | [ML²T⁻²A⁻²] |","| Permittivity | Capacitance × Length / Area | [M⁻¹L⁻³T⁴A²] |","| Permeability | Inductance × Length / Area | [MLT⁻²A⁻²] |","| Conductance | 1 / Resistance | [M⁻¹L⁻²T³A²] |","| Conductivity | 1 / Resistivity | [M⁻¹L⁻³T³A²] |"],formulas:[],tips:["The dimensional formula of Resistance [ML²T⁻³A⁻²] and its reciprocal Conductance [M⁻¹L⁻²T³A²] are important for VITEEE.","Electric Potential and EMF have the same dimensional formula: [ML²T⁻³A⁻¹]."]},{id:"types-of-errors",title:"Types of Errors",content:["In experimental measurements, errors can be classified into three types:","**1. Constant (Systematic) Errors:** These occur due to faulty instruments, personal bias, or experimental design flaws. They always have the same sign and magnitude. Examples: zero error in vernier calipers, a clock that always runs slow.","**2. Systematic Errors:** These follow a definite pattern and can be identified and corrected. They arise from environmental factors, instrumental errors, or observational errors.","**3. Random Errors:** These are unpredictable and occur due to unpredictable fluctuations in experimental conditions. They can be minimized by taking multiple readings and computing the mean. They follow a Gaussian (normal) distribution.","The **mean (average)** of measurements is the best estimate: $\\bar{x} = \\frac{x_1 + x_2 + \\cdots + x_n}{n}$","Mean absolute error: $\\bar{\\Delta x} = \\frac{|\\Delta x_1| + |\\Delta x_2| + \\cdots + |\\Delta x_n|}{n}$"],formulas:[{label:"Error in each measurement",latex:"$$\\Delta x_i = x_i - \\bar{x}$$"},{label:"Mean absolute error",latex:"$$\\bar{\\Delta x} = \\frac{\\sum_{i=1}^{n}|x_i - \\bar{x}|}{n}$$"},{label:"Relative error",latex:"$$\\delta x_r = \\frac{\\bar{\\Delta x}}{\\bar{x}}$$"},{label:"Percentage error",latex:"$$\\delta x_p = \\frac{\\bar{\\Delta x}}{\\bar{x}} \\times 100$$"}],tips:["VITEEE error propagation questions: For addition/subtraction, add absolute errors. For multiplication/division, add relative (percentage) errors.","If $z = x + y$, then $\\Delta z = \\Delta x + \\Delta y$. If $z = xy$, then $\\frac{\\Delta z}{z} = \\frac{\\Delta x}{x} + \\frac{\\Delta y}{y}$."]}]},{slug:"kinematics",title:"Kinematics",description:"Motion in 1D & 2D, vectors, projectile motion, relative velocity — core mechanics.",icon:"Move",color:"#6366f1",sections:[{id:"inertial-frames",title:"Inertial & Non-Inertial Frames",content:["**Inertial Frame of Reference:** A frame of reference in which Newton's first law of motion holds true. In such a frame, a body at rest remains at rest and a body in uniform motion continues in uniform motion unless acted upon by an external force.","An inertial frame is either at rest or moving with constant velocity (zero acceleration). All inertial frames are equivalent for the statement of Newton's laws.","**Non-Inertial Frame:** A frame of reference that is accelerating (either linearly or rotationally). In a non-inertial frame, Newton's first law does not hold — objects appear to accelerate without any real force acting on them.","To apply Newton's laws in a non-inertial frame, we introduce **pseudo forces** (fictitious forces) such as centrifugal force and Coriolis force.","Example: A car accelerating forward — a passenger feels pushed backward (pseudo force in the opposite direction of acceleration)."],formulas:[{label:"Pseudo force",latex:"$$F_{\\text{pseudo}} = -ma_0$$"},{label:"Where $a_0$ = acceleration of non-inertial frame",latex:""}],tips:["Earth is approximately an inertial frame for most problems, though it is technically non-inertial due to rotation.","In VITEEE, always identify the frame of reference first before applying Newton's laws."]},{id:"speed-velocity",title:"Speed & Velocity",content:["**Speed** is a scalar quantity that measures how fast a body moves — it is the rate of change of distance with respect to time. Speed is always positive.","**Velocity** is a vector quantity that measures the rate of change of displacement with respect to time. Velocity can be positive, negative, or zero.","There are two types of each: **average** (over a time interval) and **instantaneous** (at a specific instant).","Average speed is NOT necessarily equal to the magnitude of average velocity, because distance ≥ displacement.","For uniform circular motion: average speed = circumference/time, but average velocity = 0 (displacement = 0 for one complete revolution).","Instantaneous velocity is the limit of average velocity as the time interval approaches zero."],formulas:[{label:"Average velocity",latex:"$$v_{\\text{avg}} = \\frac{\\Delta s}{\\Delta t} = \\frac{s_2 - s_1}{t_2 - t_1}$$"},{label:"Instantaneous velocity",latex:"$$v_{\\text{inst}} = \\lim_{\\Delta t \\to 0} \\frac{\\Delta s}{\\Delta t} = \\frac{ds}{dt}$$"},{label:"Average speed",latex:"$$\\text{Average speed} = \\frac{\\text{Total distance}}{\\text{Total time}}$$"}],tips:["If speed-time graph is given, the area under the curve gives total distance, NOT displacement.","Slope of displacement-time graph gives velocity. Slope of velocity-time graph gives acceleration."]},{id:"acceleration",title:"Acceleration",content:["**Acceleration** is the rate of change of velocity with respect to time. It is a vector quantity with SI unit m/s².","**Average acceleration:** $a_{avg} = \\frac{\\Delta v}{\\Delta t}$ (change in velocity over a time interval).","**Instantaneous acceleration:** $a_{inst} = \\frac{dv}{dt}$ (derivative of velocity with respect to time).","Types of acceleration:","- **Uniform acceleration:** Acceleration remains constant (magnitude and direction). Equations of motion apply.","- **Non-uniform acceleration:** Acceleration changes with time. Equations of motion do NOT apply directly.","- **Positive/Negative acceleration:** Also called speeding up / slowing down, but direction matters — a negative acceleration can mean slowing down if velocity is positive.","- **Centripetal acceleration:** For circular motion, $a_c = v^2/r$ directed toward the center.","For a body thrown upward under gravity: acceleration = −g (directed downward throughout the motion)."],formulas:[{label:"Acceleration",latex:"$$a = \\frac{dv}{dt} = \\frac{d^2s}{dt^2}$$"},{label:"Under gravity (upward positive)",latex:"$$a = -g = -9.8 \\text{ m/s}^2$$"}],tips:["Acceleration is not always in the direction of velocity. In circular motion, acceleration is perpendicular to velocity.","When a body is at the highest point of its trajectory (projectile), its vertical velocity is zero but acceleration is still g downward."]},{id:"equations-of-motion",title:"Equations of Motion",content:["For uniformly accelerated motion, the following three equations relate velocity, displacement, acceleration, and time. These are valid ONLY when acceleration is constant.","**First Equation** (velocity-time relation): Gives final velocity in terms of initial velocity, acceleration, and time.","**Second Equation** (displacement-time relation): Gives displacement in terms of initial velocity, acceleration, and time.","**Third Equation** (velocity-displacement relation): Gives final velocity without involving time.","These equations can also be used for free fall under gravity by replacing $a$ with $g$ (or $-g$ for upward motion).","**Important:** These equations are valid for straight-line motion only. For 2D motion, resolve into components."],formulas:[{label:"First equation (v-t relation)",latex:"$$v = u + at$$"},{label:"Second equation (s-t relation)",latex:"$$s = ut + \\frac{1}{2}at^2$$"},{label:"Third equation (v-s relation)",latex:"$$v^2 = u^2 + 2as$$"}],tips:["For free fall (dropped from rest): $v = gt$, $h = \\frac{1}{2}gt^2$, $v^2 = 2gh$.","These three equations plus the displacement in nth second formula cover most VITEEE kinematics questions."]},{id:"displacement-nth-second",title:"Displacement in nth Second",content:["The displacement in the nth second of uniformly accelerated motion is the displacement between time $t = (n-1)$ and $t = n$.","This formula gives the displacement covered specifically in the nth second, not the total displacement up to n seconds.","It can be derived by subtracting the displacement in (n-1) seconds from displacement in n seconds.","This formula is particularly useful for problems asking about distance covered in a specific second."],formulas:[{label:"Displacement in nth second",latex:"$$s_n = u + \\frac{1}{2}a(2n - 1)$$"}],tips:["Notice: Displacement in the nth second is independent of all previous seconds — it only depends on u, a, and n.","For a freely falling body (u=0): $s_n = \\frac{1}{2}g(2n-1)$. The ratio of displacements in successive seconds is 1:3:5:7... (odd numbers)."]},{id:"motion-graphs",title:"Motion Graphs",content:["Graphs are powerful tools for analyzing motion:","**Position-Time (x-t) Graph:** Slope = velocity. Straight line = uniform velocity. Curved line = accelerated motion. Slope increasing = acceleration, slope decreasing = deceleration.","**Velocity-Time (v-t) Graph:** Slope = acceleration. Area under curve = displacement. Straight horizontal line = uniform velocity (zero acceleration). Straight sloped line = uniform acceleration. Parabola = non-uniform acceleration.","**Acceleration-Time (a-t) Graph:** Area under curve = change in velocity. For uniform acceleration, it's a horizontal line.","Key observations:","- If x-t graph is parabola opening upward → positive acceleration","- If v-t graph crosses the time axis → direction of motion reverses","- Two bodies meet when their x-t graphs intersect (same position at same time)","- For uniformly accelerated motion, v-t graph is a straight line (not horizontal)"],formulas:[],tips:["VITEEE often provides graphs and asks questions about velocity, acceleration, or displacement — practice reading all three types.","The area under v-t graph gives displacement (signed area) or distance (absolute area). The area under a-t graph gives change in velocity."]},{id:"vectors",title:"Vectors",content:["**Vector** quantities have both magnitude and direction (e.g., displacement, velocity, force). **Scalar** quantities have only magnitude (e.g., distance, speed, mass).","**Triangle Law of Vector Addition:** If two vectors are represented in magnitude and direction by two sides of a triangle taken in order, then their resultant is represented by the third side taken in the opposite order.","**Parallelogram Law:** If two vectors act at a point, their resultant is given by the diagonal of the parallelogram formed by the two vectors as adjacent sides.","**Dot Product (Scalar Product):** $\\vec{A} \\cdot \\vec{B} = AB\\cos\\theta$. Result is a scalar. If $\\vec{A} \\perp \\vec{B}$, dot product = 0. Work is dot product of force and displacement.","**Cross Product (Vector Product):** $\\vec{A} \\times \\vec{B} = AB\\sin\\theta \\hat{n}$. Result is a vector perpendicular to both A and B. Torque and angular momentum are cross products."],formulas:[{label:"Resultant (Parallelogram Law)",latex:"$$\\vec{R} = \\sqrt{A^2 + B^2 + 2AB\\cos\\theta}$$"},{label:"Direction of resultant",latex:"$$\\tan\\alpha = \\frac{B\\sin\\theta}{A + B\\cos\\theta}$$"},{label:"Dot product",latex:"$$\\vec{A} \\cdot \\vec{B} = A_xB_x + A_yB_y + A_zB_z = AB\\cos\\theta$$"},{label:"Cross product (magnitude)",latex:"$$|\\vec{A} \\times \\vec{B}| = AB\\sin\\theta$$"}],tips:["If two vectors are perpendicular: $R = \\sqrt{A^2 + B^2}$. If parallel: $R = A + B$ or $|A - B|$.","The cross product of parallel vectors is zero. This is important in VITEEE."]},{id:"resolution-of-vectors",title:"Resolution of Vectors",content:["Breaking a vector into its components along perpendicular axes is called resolution of vectors. This is extremely useful in solving physics problems.","If a vector $\\vec{A}$ makes an angle $\\theta$ with the x-axis, its components along x and y axes are:","The magnitude of the original vector can be found from its components: $A = \\sqrt{A_x^2 + A_y^2}$","Resolution is the reverse process of vector addition. Any 2D vector can be expressed as the sum of its rectangular components.","For 3D vectors, we resolve along all three axes (x, y, z)."],formulas:[{label:"X-component",latex:"$$A_x = A\\cos\\theta$$"},{label:"Y-component",latex:"$$A_y = A\\sin\\theta$$"},{label:"Magnitude from components",latex:"$$A = \\sqrt{A_x^2 + A_y^2}$$"}],tips:["Always resolve vectors into components before applying equations of motion in 2D (like projectile motion).","On an inclined plane, resolve gravity into components: parallel to plane = $mg\\sin\\theta$, perpendicular = $mg\\cos\\theta$."]},{id:"inclined-plane",title:"Inclined Plane Motion",content:["Motion on an inclined plane is a classic application of vector resolution. The acceleration of a body sliding down (or up) a frictionless inclined plane depends on the angle of inclination.","For a body sliding DOWN a rough inclined plane: friction acts up the plane, so net acceleration is reduced.","For a body pushed UP a rough inclined plane: both gravity component and friction act down the plane.","**Conditions for sliding:** The body will slide if $\\tan\\theta > \\mu_s$ (i.e., angle of inclination exceeds angle of repose). If $\\tan\\theta < \\mu_s$, the body remains stationary.","The normal reaction on an inclined plane is always $N = mg\\cos\\theta$ (perpendicular to the surface, NOT mg)."],formulas:[{label:"Frictionless incline (down)",latex:"$$a = g\\sin\\theta$$"},{label:"Rough incline (down)",latex:"$$a = g(\\sin\\theta - \\mu\\cos\\theta)$$"},{label:"Rough incline (up)",latex:"$$a = -g(\\sin\\theta + \\mu\\cos\\theta)$$"},{label:"Normal reaction",latex:"$$N = mg\\cos\\theta$$"}],tips:["The body slides down only if $\\theta > \\tan^{-1}(\\mu)$. If not, static friction prevents motion.","Time to slide down a smooth incline of length L: $t = \\sqrt{\\frac{2L}{g\\sin\\theta}}$."]},{id:"relative-velocity",title:"Relative Velocity",content:["Relative velocity is the velocity of one object as observed from another moving object. It is the vector difference of their velocities.","If two objects move in the **same direction**: relative speed = $|v_1 - v_2|$. If in **opposite directions**: relative speed = $v_1 + v_2$.","**River-boat problems:** To cross a river in minimum time, the boat must head perpendicular to the current. To reach directly opposite point, the boat must head upstream at an angle.","**Rain-man problems:** The apparent direction of rain changes with the man's velocity. If a man moves with velocity $\\vec{v}_m$, the apparent rain velocity is $\\vec{v}_{rain} - \\vec{v}_m$."],formulas:[{label:"Relative velocity",latex:"$$\\vec{v}_{AB} = \\vec{v}_A - \\vec{v}_B$$"},{label:"Magnitude",latex:"$$|\\vec{v}_{AB}| = \\sqrt{v_A^2 + v_B^2 - 2v_Av_B\\cos\\theta}$$"}],tips:["Draw vector diagrams for river-boat and rain-man problems — it simplifies everything.","For minimum time to cross river: swim perpendicular to bank. For minimum drift: swim at angle $\\sin^{-1}(v_r/v_b)$ upstream."]},{id:"projectile-motion",title:"Projectile Motion",content:["A projectile is any object thrown into space under the action of gravity only (air resistance neglected). The horizontal and vertical motions are completely independent.","**Key results for a projectile launched from ground with velocity $u$ at angle $\\theta$:**","The trajectory (path) is a parabola. At the highest point, vertical velocity = 0, horizontal velocity = $u\\cos\\theta$. The time of ascent equals the time of descent.","**Maximum Range:** occurs at $\\theta = 45°$. For complementary angles ($\\theta$ and $90° - \\theta$), the range is the same.","**Projectile from a height:** If fired horizontally from height $h$: $T = \\sqrt{2h/g}$, $R = u\\sqrt{2h/g}$.","**From an inclined plane:** For a projectile fired up an inclined plane of angle $\\beta$, the range along the plane and time of flight are modified by $\\beta$."],formulas:[{label:"Time of flight",latex:"$$T = \\frac{2u\\sin\\theta}{g}$$"},{label:"Maximum height",latex:"$$H = \\frac{u^2\\sin^2\\theta}{2g}$$"},{label:"Horizontal range",latex:"$$R = \\frac{u^2\\sin 2\\theta}{g}$$"},{label:"Maximum range",latex:"$$R_{\\max} = \\frac{u^2}{g} \\text{ at } \\theta = 45°$$"},{label:"Trajectory equation",latex:"$$y = x\\tan\\theta - \\frac{gx^2}{2u^2\\cos^2\\theta}$$"},{label:"Velocity at any point",latex:"$$v = \\sqrt{u^2 - 2gy}$$"}],tips:["For complementary angles (θ and 90°−θ), ranges are equal: R(θ) = R(90°−θ). Heights are different.","At maximum height: $v_{vertical} = 0$, $v_{horizontal} = u\\cos\\theta$, $t = T/2$.","VITEEE often asks about the trajectory equation — memorize $y = x\\tan\\theta - \\frac{gx^2}{2u^2\\cos^2\\theta}$."]},{id:"free-fall",title:"Free Fall",content:["Free fall is the motion of a body under the influence of gravity alone (no air resistance). All bodies fall with the same acceleration $g$ regardless of mass (Galileo's observation).","**Key points:**","- A body thrown upward with velocity $u$: reaches max height $h = u^2/(2g)$ in time $t = u/g$, then falls back down.","- Time of ascent = Time of descent = $u/g$. Total time in air = $2u/g$.","- Velocity at any point during ascent and descent at the same height is equal in magnitude but opposite in direction.","- A body dropped from height $h$: reaches ground with velocity $v = \\sqrt{2gh}$ in time $t = \\sqrt{2h/g}$.","In numerical problems, take $g = 9.8$ m/s² (or 10 m/s² if specified) and always define the positive direction clearly."],formulas:[{label:"Height (upward positive)",latex:"$$h = ut - \\frac{1}{2}gt^2$$"},{label:"Velocity (upward positive)",latex:"$$v = u - gt$$"},{label:"Third equation (free fall)",latex:"$$v^2 = u^2 - 2gh$$"},{label:"Maximum height",latex:"$$H = \\frac{u^2}{2g}$$"},{label:"Time to reach max height",latex:"$$t = \\frac{u}{g}$$"}],tips:["A body thrown upward and another dropped from the same height reach the ground simultaneously if thrown at the same time.","When two bodies are dropped from the same height, the difference in their positions increases with time: $\\Delta h = \\frac{1}{2}g(2n-1)dt$."]}]},{slug:"laws-of-motion",title:"Laws of Motion",description:"Newton's laws, friction, impulse, conservation of momentum, connected bodies.",icon:"ArrowRight",color:"#8b5cf6",sections:[{id:"momentum",title:"Linear Momentum",content:["**Linear momentum** ($\\vec{p}$) is the product of mass and velocity of a body. It is a vector quantity with the same direction as velocity. SI unit: kg·m/s.","Momentum is a measure of the 'quantity of motion' possessed by a body. A heavier body moving faster has more momentum.","Newton's second law can be stated in terms of momentum: Force is the rate of change of momentum.","When no external force acts on a system, the total momentum remains constant — this is the **Law of Conservation of Linear Momentum**.","Momentum depends on the frame of reference. In different inertial frames, the same body has different momentum values."],formulas:[{label:"Linear momentum",latex:"$$\\vec{p} = m\\vec{v}$$"},{label:"Newton's second law (momentum form)",latex:"$$\\vec{F} = \\frac{d\\vec{p}}{dt}$$"},{label:"For constant mass",latex:"$$\\vec{F} = m\\vec{a}$$"}],tips:["Momentum is conserved in ALL types of collisions (elastic, inelastic, perfectly inelastic).","A bullet fired from a gun: the gun recoils because total momentum must remain zero (initially at rest)."]},{id:"newtons-laws",title:"Newton's Three Laws of Motion",content:["**First Law (Law of Inertia):** A body continues in its state of rest or uniform motion in a straight line unless acted upon by an external unbalanced force. This defines inertia — the tendency of a body to resist change in its state of motion.","**Second Law:** The rate of change of momentum of a body is directly proportional to the applied force and takes place in the direction of the force. Mathematically: $F = ma$ (for constant mass).","**Third Law:** To every action, there is an equal and opposite reaction. Action and reaction forces act on different bodies, NEVER on the same body. They are simultaneous and equal in magnitude.","**Important applications:**","- First law explains why seatbelts are needed (inertia)","- Second law connects force, mass, and acceleration","- Third law explains rocket propulsion, recoil of guns, walking"],formulas:[{label:"Second Law",latex:"$$F = ma$$"},{label:"Second Law (momentum form)",latex:"$$F = \\frac{dp}{dt}$$"},{label:"Weight (gravitational force)",latex:"$$W = mg$$"}],tips:["Always draw Free Body Diagrams (FBDs) before solving Newton's law problems.","Action-reaction pairs act on DIFFERENT bodies. Normal force and weight on a book on a table are NOT an action-reaction pair.","VITEEE frequently tests applications: Atwood machine, blocks on surfaces, pulley systems."]},{id:"impulse",title:"Impulse",content:["**Impulse** is the product of force and the time interval over which it acts. It is equal to the change in momentum of the body. Impulse is a vector quantity with SI unit N·s (Newton-second) or kg·m/s.","When a large force acts for a short time (like a bat hitting a ball), the product $F \\times \\Delta t$ gives the impulse, which equals the change in momentum.","Impulse-momentum theorem is one of the most powerful tools in mechanics. It's used in collision problems, rocket propulsion, and when force varies with time.","In graphs, the area under a Force-Time graph gives the impulse (= change in momentum)."],formulas:[{label:"Impulse",latex:"$$J = F\\Delta t = \\Delta p = m(v - u)$$"},{label:"Impulse-momentum theorem",latex:"$$\\vec{J} = \\Delta\\vec{p} = m(\\vec{v}_f - \\vec{v}_i)$$"},{label:"From F-t graph",latex:"$$J = \\int_{t_1}^{t_2} F \\, dt$$"}],tips:["Impulse and momentum have the same units (kg·m/s). This is not a coincidence — impulse IS change in momentum.","A cricket player lowers his hands while catching a ball to increase the time of catch, thereby reducing the force experienced (same impulse, larger time → smaller force)."]},{id:"apparent-weight",title:"Apparent Weight in a Lift",content:["When a person stands on a weighing machine inside a lift (elevator), the reading on the scale shows the **apparent weight**, which may differ from the true weight $mg$.","**Lift going UP with acceleration $a$:** The normal force (apparent weight) is greater than the true weight. The person feels heavier.","**Lift going DOWN with acceleration $a$:** The normal force is less than the true weight. The person feels lighter.","**Lift moving with uniform velocity:** $a = 0$, so apparent weight = true weight. No change is felt.","**Lift in free fall ($a = g$):** Apparent weight = 0. The person experiences weightlessness. This is the same condition as in a satellite in orbit."],formulas:[{label:"Going up (accelerating)",latex:"$$W_{\\text{apparent}} = m(g + a)$$"},{label:"Going down (accelerating)",latex:"$$W_{\\text{apparent}} = m(g - a)$$"},{label:"Free fall (weightless)",latex:"$$W_{\\text{apparent}} = m(g - g) = 0$$"}],tips:["If the lift accelerates upward, apparent weight increases. If downward, it decreases. Remember: 'up = heavier, down = lighter'.","VITEEE may ask: 'A person of mass 60 kg in a lift accelerating up at 2 m/s² — what is the apparent weight?' Answer: $60(9.8 + 2) = 708$ N."]},{id:"conservation-momentum",title:"Conservation of Linear Momentum",content:["**Law of Conservation of Linear Momentum:** When no external force acts on a system, the total linear momentum of the system remains constant. This is one of the most fundamental conservation laws in physics.","Mathematically: $\\vec{p}_{\\text{initial}} = \\vec{p}_{\\text{final}}$ for the system.","This law is derived from Newton's second and third laws. Since internal forces occur in action-reaction pairs that cancel out, only external forces can change the total momentum.","**Applications:** Collisions (all types), recoil of guns, rocket propulsion, explosion of a body into fragments.","In a collision between two bodies, momentum is ALWAYS conserved (regardless of whether the collision is elastic or inelastic). Kinetic energy is conserved ONLY in elastic collisions."],formulas:[{label:"Two-body collision",latex:"$$m_1u_1 + m_2u_2 = m_1v_1 + m_2v_2$$"},{label:"For a system (vector form)",latex:"$$\\sum \\vec{p}_i = \\text{constant} \\quad (\\text{when } \\vec{F}_{\\text{ext}} = 0)$$"}],tips:["Momentum is conserved in the direction where there is no external force. Apply conservation separately for x and y components.","In VITEEE, explosion problems: a body at rest explodes into fragments. Total momentum = 0 before and after. So $m_1v_1 + m_2v_2 = 0$."]},{id:"recoil-of-gun",title:"Recoil of Gun",content:["When a bullet is fired from a gun, the gun recoils (moves backward). This happens due to conservation of linear momentum.","Before firing: total momentum = 0 (both at rest). After firing: $mv + MV = 0$, so the gun moves in the opposite direction with velocity $V = -mv/M$.","Since the mass of the gun ($M$) is much greater than the mass of the bullet ($m$), the recoil velocity of the gun is much smaller than the bullet's velocity.","**Kinetic energy distribution:** Although momenta are equal, the kinetic energy of the bullet is much greater than the kinetic energy of the gun: $KE_{\\text{bullet}}/KE_{\\text{gun}} = M/m$."],formulas:[{label:"Recoil velocity of gun",latex:"$$V = -\\frac{mv}{M}$$"},{label:"KE ratio (bullet to gun)",latex:"$$\\frac{KE_{\\text{bullet}}}{KE_{\\text{gun}}} = \\frac{M}{m}$$"}],tips:["The negative sign indicates the gun moves in the opposite direction to the bullet.","Recoil velocity is inversely proportional to the mass of the gun — heavier guns have smaller recoil."]},{id:"friction",title:"Friction",content:["Friction is a contact force that opposes relative motion (or tendency of relative motion) between two surfaces in contact.","**Static Friction ($f_s$):** Self-adjusting force that matches the applied force up to a maximum. $f_s \\leq \\mu_s N$ where $\\mu_s$ is the coefficient of static friction.","**Kinetic Friction ($f_k$):** Constant force that opposes motion. $f_k = \\mu_k N$ where $\\mu_k$ is the coefficient of kinetic friction. Always $\\mu_k < \\mu_s$.","**Rolling Friction:** Much smaller than kinetic friction. This is why wheels make transportation easier.","**Angle of Friction ($\\tan^{-1}\\mu$):** The angle between the resultant of normal reaction and friction force, and the normal reaction.","**Angle of Repose:** The minimum angle of inclination of an inclined plane at which a body just begins to slide down. It equals the angle of friction: $\\theta = \\tan^{-1}(\\mu)$."],formulas:[{label:"Maximum static friction",latex:"$$f_s \\leq \\mu_s N$$"},{label:"Kinetic friction",latex:"$$f_k = \\mu_k N$$"},{label:"Angle of repose",latex:"$$\\theta = \\tan^{-1}(\\mu)$$"},{label:"Body slides when",latex:"$$\\tan\\theta > \\mu \\implies \\theta > \\tan^{-1}(\\mu)$$"}],tips:["Friction opposes relative motion, NOT motion itself. Without friction, you couldn't walk or drive.","On an inclined plane: $N = mg\\cos\\theta$ (NOT mg). This is a common mistake in VITEEE.","Static friction adjusts itself from 0 to $\\mu_s N$ to prevent motion. Kinetic friction is always $\\mu_k N$."]},{id:"pseudo-force",title:"Pseudo Force",content:["A **pseudo force** (also called fictitious force or inertial force) is an apparent force that appears to act on a body when observed from a non-inertial (accelerating) frame of reference.","Pseudo force = $-ma_0$ where $m$ is the mass of the body and $a_0$ is the acceleration of the non-inertial frame. The negative sign means it acts opposite to the acceleration of the frame.","Pseudo forces are NOT real forces — they don't arise from any physical interaction. However, they are essential for correctly applying Newton's laws in accelerating frames.","**Examples:** Centrifugal force (in a rotating frame), force felt in an accelerating elevator or car.","**Important:** Pseudo forces are used only in non-inertial frames. In inertial frames, there are no pseudo forces."],formulas:[{label:"Pseudo force in accelerating frame",latex:"$$F_{\\text{pseudo}} = -ma_0$$"}],tips:["In VITEEE, if a problem involves an accelerating frame (like a rotating platform or accelerating car), consider pseudo forces.","Centrifugal force = $m\\omega^2 r$ (outward) is a pseudo force in the rotating frame. Centripetal force = $mv^2/r$ (inward) is a real force."]},{id:"connected-bodies",title:"Connected Bodies (Atwood Machine)",content:["**Atwood Machine** consists of two masses connected by a light, inextensible string passing over a frictionless pulley.","When $m_1 > m_2$: the heavier mass accelerates downward and the lighter mass accelerates upward.","The acceleration of the system and the tension in the string can be found by applying Newton's second law to each mass separately.","**General connected body problems:** Draw FBD for each body, write $F = ma$ for each, and solve simultaneously. The key constraint is that the acceleration magnitudes are equal (connected by inextensible string) and the tension is the same throughout (massless, frictionless pulley)."],formulas:[{label:"Atwood machine acceleration",latex:"$$a = \\frac{(m_1 - m_2)g}{m_1 + m_2}$$"},{label:"Tension in string",latex:"$$T = \\frac{2m_1m_2g}{m_1 + m_2}$$"}],tips:["For an Atwood machine with equal masses ($m_1 = m_2$), acceleration = 0 and tension = $mg$. The system is in equilibrium.","If the pulley has mass or friction, the analysis changes — VITEEE usually specifies 'light, frictionless pulley' to simplify."]}]},{slug:"work-power-energy",title:"Work, Power & Energy",description:"Work-energy theorem, conservative forces, collisions, coefficient of restitution.",icon:"Zap",color:"#f59e0b",sections:[{id:"work",title:"Work Done by a Force",content:["**Work** is done when a force displaces a body in its own direction (or has a component along the displacement). It is a scalar quantity with SI unit Joule (J) = N·m.","Work = Dot product of force and displacement: $W = \\vec{F} \\cdot \\vec{d} = Fd\\cos\\theta$ where $\\theta$ is the angle between force and displacement.","- When $\\theta = 0°$: $W = Fd$ (maximum positive work)","- When $\\theta = 90°$: $W = 0$ (no work — e.g., centripetal force in circular motion)","- When $\\theta = 180°$: $W = -Fd$ (maximum negative work)","Work can be positive, negative, or zero depending on the angle between force and displacement.","The area under a Force-Displacement graph gives the work done."],formulas:[{label:"Work done",latex:"$$W = \\vec{F} \\cdot \\vec{d} = Fd\\cos\\theta$$"},{label:"Work by variable force",latex:"$$W = \\int_{x_1}^{x_2} F(x) \\, dx$$"}],tips:["Centripetal force does NO work on a body in circular motion (F ⊥ v always).","Gravity does positive work when a body falls and negative work when it rises."]},{id:"power",title:"Power",content:["**Power** is the rate at which work is done. It is a scalar quantity with SI unit Watt (W) = J/s.","Average power = Total work / Total time. Instantaneous power = $\\vec{F} \\cdot \\vec{v}$ (dot product of force and velocity).","When force and velocity are in the same direction: $P = Fv$. This is the formula used for vehicles.","Larger units of power: 1 Horsepower (HP) = 746 W, 1 kW = 1000 W.","Power is also related to energy: $P = \\frac{dE}{dt}$ (rate of energy change)."],formulas:[{label:"Power",latex:"$$P = \\frac{W}{t} = \\vec{F} \\cdot \\vec{v}$$"},{label:"HP to Watts conversion",latex:"$$1 \\text{ HP} = 746 \\text{ W}$$"},{label:"Instantaneous power",latex:"$$P = Fv\\cos\\theta$$"}],tips:["At maximum velocity (terminal velocity), the driving power equals the resistive power (friction/drag).","For a vehicle on a road at constant speed: Engine power = Friction force × Velocity."]},{id:"kinetic-energy",title:"Kinetic Energy",content:["**Kinetic Energy (KE)** is the energy possessed by a body due to its motion. It is a scalar quantity and is always non-negative.","For translational motion: $KE = \\frac{1}{2}mv^2$. It depends on mass and speed (NOT velocity direction).","The work-energy theorem states that the net work done on a body equals its change in kinetic energy. This is a powerful result that connects force, displacement, and velocity.","KE is frame-dependent — a body at rest in one frame may have KE in another frame.","KE is proportional to $v^2$, so doubling speed quadruples the KE. This is why high-speed collisions are so destructive."],formulas:[{label:"Kinetic energy",latex:"$$KE = \\frac{1}{2}mv^2$$"},{label:"In terms of momentum",latex:"$$KE = \\frac{p^2}{2m}$$"}],tips:["If two bodies have the same KE, the lighter body has more momentum: $p = \\sqrt{2m \\cdot KE}$.","Rotational KE = $\\frac{1}{2}I\\omega^2$ (analogous to translational KE)."]},{id:"potential-energy",title:"Potential Energy",content:["**Potential Energy (PE)** is the energy possessed by a body due to its position or configuration. It is stored energy that can be converted to kinetic energy.","**Gravitational PE:** $PE = mgh$ (near Earth's surface, where g is approximately constant). This energy is due to the body's position in a gravitational field.","**Elastic (Spring) PE:** $PE = \\frac{1}{2}kx^2$ where $k$ is the spring constant and $x$ is the displacement from the natural length. This energy is due to the configuration (compression/extension) of the spring.","PE is defined relative to a reference point (conventionally PE = 0 at Earth's surface for gravity, and at natural length for springs). Only changes in PE are physically meaningful."],formulas:[{label:"Gravitational PE",latex:"$$PE = mgh$$"},{label:"Elastic (Spring) PE",latex:"$$PE = \\frac{1}{2}kx^2$$"}],tips:["Spring PE depends on $x^2$ — compressing by 2 cm stores 4 times the energy of compressing by 1 cm.","PE is associated with conservative forces. Non-conservative forces (like friction) do NOT have potential energy."]},{id:"work-energy-theorem",title:"Work-Energy Theorem",content:["The **Work-Energy Theorem** states that the net work done by all forces (conservative and non-conservative) acting on a body equals the change in its kinetic energy.","This theorem is valid for all types of forces and all types of motion (variable acceleration, curvilinear motion, etc.). It is derived from Newton's second law.","If only conservative forces do work, then $W_{\\text{conservative}} = -\\Delta PE$, and the total mechanical energy ($KE + PE$) is conserved.","If non-conservative forces (like friction) do work: $W_{\\text{nc}} = \\Delta KE + \\Delta PE = \\Delta E$.","The theorem is incredibly useful — instead of using F = ma and solving differential equations, you can directly relate work to the change in velocity."],formulas:[{label:"Work-Energy Theorem",latex:"$$W_{\\text{net}} = \\Delta KE = \\frac{1}{2}mv^2 - \\frac{1}{2}mu^2$$"},{label:"With non-conservative forces",latex:"$$W_{\\text{nc}} = \\Delta KE + \\Delta PE$$"}],tips:["If only conservative forces act: $\\Delta KE = -\\Delta PE$, so $KE + PE = \\text{constant}$.","If friction is present: $KE_{\\text{final}} = KE_{\\text{initial}} + W_{\\text{gravity}} + W_{\\text{friction}}$."]},{id:"conservation-energy",title:"Conservation of Energy",content:["**Law of Conservation of Energy:** Energy can neither be created nor destroyed; it can only be transformed from one form to another. The total energy of an isolated system always remains constant.","For mechanical systems: Total Mechanical Energy = $KE + PE = \\text{constant}$ (when only conservative forces act).","In real-world systems, some mechanical energy is always lost to non-conservative forces (friction, air resistance, heat, sound).","**Conservative Forces:** Work done depends only on initial and final positions (path-independent). Examples: gravity, spring force, electrostatic force. For conservative forces: $\\oint \\vec{F} \\cdot d\\vec{r} = 0$."],formulas:[{label:"Conservative force relation",latex:"$$F = -\\frac{dV}{dr}$$"},{label:"Path independence",latex:"$$\\oint \\vec{F} \\cdot d\\vec{r} = 0$$"},{label:"Total mechanical energy",latex:"$$E = KE + PE = \\text{constant}$$"}],tips:["In a frictionless roller coaster: total energy at the top = total energy at the bottom. $mgh_{top} + \\frac{1}{2}mv_{top}^2 = mgh_{bottom} + \\frac{1}{2}mv_{bottom}^2$.","If friction acts: energy lost = $\\mu mgd$ where d is the distance moved."]},{id:"collisions",title:"Collisions",content:["A **collision** is an event where two or more bodies exert forces on each other for a short time. Momentum is ALWAYS conserved in collisions.","**Elastic Collision ($e = 1$):** Both momentum and kinetic energy are conserved. Molecules of ideal gas undergo elastic collisions.","**Inelastic Collision ($0 < e < 1$):** Momentum is conserved, but KE is NOT conserved (some KE is lost to heat, sound, deformation). Most real-world collisions are inelastic.","**Perfectly Inelastic Collision ($e = 0$):** The colliding bodies stick together after collision. Maximum KE is lost (but momentum is still conserved).","**Coefficient of Restitution ($e$):** Ratio of relative velocity of separation to relative velocity of approach. $e = 1$ for elastic, $e = 0$ for perfectly inelastic."],formulas:[{label:"Coefficient of restitution",latex:"$$e = \\frac{v_2 - v_1}{u_1 - u_2}$$"},{label:"Elastic: v₁ after collision",latex:"$$v_1 = \\frac{(m_1 - m_2)u_1 + 2m_2u_2}{m_1 + m_2}$$"},{label:"Elastic: v₂ after collision",latex:"$$v_2 = \\frac{(m_2 - m_1)u_2 + 2m_1u_1}{m_1 + m_2}$$"},{label:"KE lost in collision",latex:"$$\\Delta KE = \\frac{1}{2}\\frac{m_1m_2}{m_1 + m_2}(u_1 - u_2)^2(1 - e^2)$$"}],tips:["For equal mass elastic collision: the bodies exchange velocities ($v_1 = u_2$, $v_2 = u_1$).","When a body hits a stationary wall and rebounds: $e = |v/u|$ where v is rebound speed.","VITEEE frequently tests the collision formulas — memorize $v_1$ and $v_2$ for elastic collisions."]}]},{slug:"gravitation-projectile",title:"Gravitation & Projectile",description:"Kepler's laws, universal gravitation, satellites, escape velocity, orbital mechanics.",icon:"Globe",color:"#3b82f6",sections:[{id:"keplers-laws",title:"Kepler's Laws of Planetary Motion",content:["**First Law (Law of Orbits):** Every planet revolves around the Sun in an elliptical orbit with the Sun at one of the foci.","**Second Law (Law of Areas):** The line joining a planet to the Sun sweeps out equal areas in equal intervals of time. This means the planet moves faster when closer to the Sun (perihelion) and slower when farther (aphelion). This law is a consequence of conservation of angular momentum.","**Third Law (Law of Periods):** The square of the time period of revolution of a planet is directly proportional to the cube of the semi-major axis of its orbit.","These laws were empirical (based on observations by Tycho Brahe). Newton later derived them from his law of universal gravitation."],formulas:[{label:"Third Law",latex:"$$T^2 \\propto r^3 \\implies \\frac{T^2}{r^3} = \\text{constant}$$"},{label:"With G and M (sun)",latex:"$$T^2 = \\frac{4\\pi^2}{GM}r^3$$"}],tips:["Kepler's third law applies to ANY system of orbiting bodies, not just planets around the Sun.","The areal velocity (dA/dt) is constant — this is direct evidence of angular momentum conservation."]},{id:"newtons-gravitation",title:"Newton's Law of Universal Gravitation",content:["Every particle in the universe attracts every other particle with a force that is directly proportional to the product of their masses and inversely proportional to the square of the distance between them.","The force acts along the line joining the two masses and is always attractive.","**Gravitational Constant ($G$):** $G = 6.674 \\times 10^{-11}$ N·m²/kg². It is a universal constant — the same everywhere in the universe. It was first measured by Henry Cavendish using a torsion balance.","Important properties: (1) It's the weakest of the four fundamental forces, (2) It's always attractive, (3) It has infinite range, (4) It obeys the inverse square law."],formulas:[{label:"Gravitational force",latex:"$$F = \\frac{GMm}{r^2}$$"},{label:"Gravitational constant",latex:"$$G = 6.674 \\times 10^{-11} \\text{ N·m}^2/\\text{kg}^2$$"}],tips:["The gravitational force between two 1 kg masses separated by 1 m is only $6.674 \\times 10^{-11}$ N — incredibly weak!","On the surface of a uniform sphere, the gravitational force is the same as if all the mass were concentrated at the center (shell theorem)."]},{id:"acceleration-gravity",title:"Acceleration due to Gravity (g)",content:["The acceleration due to gravity ($g$) is the acceleration with which a body falls freely under gravity near the Earth's surface. $g \\approx 9.8$ m/s² (varies slightly with location).","**Variation of g with height:** $g$ decreases as we go above the Earth's surface. For heights much smaller than Earth's radius ($h \\ll R$): $g_h = g(1 - 2h/R)$.","**Variation of g with depth:** $g$ decreases linearly as we go below the Earth's surface. At the center of Earth, $g = 0$. At depth $d$: $g_d = g(1 - d/R)$.","**Variation with latitude:** $g$ is maximum at poles and minimum at equator due to: (1) Earth's oblate shape (bulging at equator), (2) Centrifugal effect of rotation."],formulas:[{label:"At Earth's surface",latex:"$$g = \\frac{GM}{R^2}$$"},{label:"At height h (h << R)",latex:"$$g_h = g\\left(1 - \\frac{2h}{R}\\right)$$"},{label:"At depth d",latex:"$$g_d = g\\left(1 - \\frac{d}{R}\\right)$$"},{label:"Due to rotation",latex:"$$g' = g - \\omega^2 R \\cos^2\\lambda$$"}],tips:["g is maximum at poles, minimum at equator. g at equator ≈ 9.78 m/s², at poles ≈ 9.83 m/s².","g = 0 at Earth's center (shell theorem: no gravitational force inside a uniform shell).","VITEEE commonly asks about g at height h and depth d — remember these formulas."]},{id:"gravitational-field-potential",title:"Gravitational Field & Potential",content:["**Gravitational Field Intensity ($\\vec{E}$):** The force experienced by a unit mass placed at a point in the gravitational field. It is a vector quantity directed toward the mass creating the field.","**Gravitational Potential ($V$):** The work done per unit mass in bringing a test mass from infinity to that point. It is a scalar quantity. Since the gravitational force is attractive, work is done by the field (not by the external agent), so V is negative.","**Gravitational Potential Energy ($U$):** The work done in bringing a mass $m$ from infinity to a distance $r$ from mass $M$. $U = mV = -GMm/r$.","Relationship: $E = -dV/dr$ (field is the negative gradient of potential)."],formulas:[{label:"Gravitational field",latex:"$$E = \\frac{GM}{r^2}$$"},{label:"Gravitational potential",latex:"$$V = -\\frac{GM}{r}$$"},{label:"Gravitational PE",latex:"$$U = -\\frac{GMm}{r}$$"},{label:"Field-Potential relation",latex:"$$E = -\\frac{dV}{dr}$$"}],tips:["Gravitational potential is always negative (for point masses and spheres). It approaches 0 at infinity.","The gravitational field inside a hollow spherical shell is zero (shell theorem)."]},{id:"escape-velocity",title:"Escape Velocity",content:["**Escape Velocity ($v_e$)** is the minimum velocity required to project a body from the surface of a planet so that it escapes the planet's gravitational field (reaches infinity with zero velocity).","To derive: Set total energy at surface = total energy at infinity. $\\frac{1}{2}mv_e^2 - \\frac{GMm}{R} = 0 + 0$, giving $v_e = \\sqrt{2GM/R}$.","Escape velocity is independent of the mass of the body being projected. A feather and a cannonball need the same escape velocity!","**For Earth:** $v_e \\approx 11.2$ km/s. For Moon: $v_e \\approx 2.4$ km/s (much smaller — no atmosphere).","Relation: $v_e = \\sqrt{2} \\times v_{\\text{orbital}}$. The escape velocity is always $\\sqrt{2}$ times the orbital velocity at the same point."],formulas:[{label:"Escape velocity",latex:"$$v_e = \\sqrt{\\frac{2GM}{R}} = \\sqrt{2gR}$$"},{label:"For Earth",latex:"$$v_e \\approx 11.2 \\text{ km/s}$$"},{label:"Relation to orbital velocity",latex:"$$v_e = \\sqrt{2} \\cdot v_0$$"}],tips:["Escape velocity is independent of the mass and direction of projection of the body.","If a body is projected with velocity > $v_e$, it escapes with residual kinetic energy at infinity.","VITEEE frequently asks: $v_e$ at Earth's surface = $\\sqrt{2gR}$ ≈ 11.2 km/s."]},{id:"orbital-velocity",title:"Orbital Velocity & Satellite Motion",content:["**Orbital Velocity ($v_0$):** The minimum horizontal velocity required to put a satellite into a stable circular orbit around the Earth at a given height.","**Time Period:** $T = 2\\pi\\sqrt{r^3/(GM)}$ where $r = R + h$. The period increases with height — higher orbits are slower.","**Satellite Energy:** The total energy of a satellite in orbit is always negative (bound state). KE is positive, PE is negative (with |PE| = 2 × KE), so total E = −KE = PE/2.","**Geostationary Satellite:** Orbits in the equatorial plane with $T = 24$ hours, so it appears stationary from Earth. Height ≈ 36,000 km above surface. Used for communication and weather monitoring.","**Binding Energy:** The minimum energy required to free a satellite from its orbit = $|E| = GMm/(2r)$."],formulas:[{label:"Orbital velocity",latex:"$$v_0 = \\sqrt{\\frac{GM}{r}} = \\frac{v_e}{\\sqrt{2}}$$"},{label:"Time period",latex:"$$T = 2\\pi\\sqrt{\\frac{r^3}{GM}}$$"},{label:"Kinetic energy of satellite",latex:"$$KE = \\frac{GMm}{2r}$$"},{label:"Potential energy of satellite",latex:"$$PE = -\\frac{GMm}{r}$$"},{label:"Total energy",latex:"$$E = -\\frac{GMm}{2r}$$"}],tips:["For a satellite close to Earth's surface: $v_0 \\approx 7.9$ km/s, $T \\approx 84$ minutes.","Geostationary satellite: $T = 24$ hrs, height ≈ 36,000 km, must be in equatorial plane.","Total energy is always negative for bound orbits. If $E = 0$, the body just escapes (parabolic trajectory). If $E > 0$, hyperbolic trajectory."]}]},{slug:"circular-rotational-motion",title:"Circular & Rotational Motion",description:"Centripetal force, moment of inertia, angular momentum, torque, rolling motion.",icon:"RotateCw",color:"#10b981",sections:[{id:"uniform-circular-motion",title:"Uniform Circular Motion",content:["**Uniform Circular Motion (UCM):** Motion of a body along a circular path with constant speed. Although speed is constant, velocity is NOT constant because direction continuously changes. Hence, there is acceleration (centripetal acceleration).","The angular displacement $\\Delta\\theta$ is related to the arc length: $\\Delta S = r\\Delta\\theta$.","**Angular Velocity ($\\omega$):** Rate of change of angular displacement. Related to linear velocity by $v = r\\omega$. Also $\\omega = 2\\pi f = 2\\pi/T$ where $f$ is frequency and $T$ is time period.","**Angular Acceleration ($\\alpha$):** Rate of change of angular velocity. Related to tangential acceleration by $a_t = r\\alpha$.","The centripetal acceleration is directed toward the center: $a_c = v^2/r = \\omega^2 r$. The tangential acceleration (if speed changes) is perpendicular to the centripetal acceleration."],formulas:[{label:"Angular displacement",latex:"$$\\Delta S = r\\Delta\\theta$$"},{label:"Angular velocity",latex:"$$\\omega = \\frac{v}{r} = 2\\pi f$$"},{label:"Angular acceleration",latex:"$$\\alpha = \\frac{a_t}{r} = \\frac{d\\omega}{dt}$$"},{label:"Centripetal acceleration",latex:"$$a_c = \\frac{v^2}{r} = \\omega^2 r$$"}],tips:["In UCM, speed is constant but velocity changes (direction changes) → acceleration is non-zero.","The total acceleration in non-uniform circular motion: $a = \\sqrt{a_c^2 + a_t^2}$."]},{id:"centripetal-centrifugal-force",title:"Centripetal & Centrifugal Force",content:["**Centripetal Force ($F_c$):** The force required to keep a body moving in a circular path. It acts toward the center of the circle. It is NOT a separate force — it is provided by tension, gravity, friction, normal reaction, or other forces.","**Centrifugal Force:** A pseudo force that appears to act on a body in the rotating (non-inertial) frame of reference. It acts radially outward. It is NOT a real force.","In the inertial frame: only centripetal force acts (real). In the rotating frame: centrifugal force balances centripetal force (apparent equilibrium).","Examples of centripetal force: Tension in string (stone tied to string), gravitational force (moon orbiting Earth), friction (car turning on road), normal reaction (wall of death ride)."],formulas:[{label:"Centripetal force",latex:"$$F_c = \\frac{mv^2}{r} = mr\\omega^2$$"},{label:"Centrifugal force (pseudo)",latex:"$$F_{\\text{cf}} = \\frac{mv^2}{r} = mr\\omega^2 \\text{ (outward)}$$"}],tips:["NEVER include both centripetal and centrifugal force in the same FBD. They exist in different reference frames.","A car turning on a flat road: centripetal force is provided by friction $f = \\mu N = \\mu mg$."]},{id:"banking-of-roads",title:"Banking of Roads",content:["**Banking** is the raising of the outer edge of a road over the inner edge at a curve to provide the necessary centripetal force for vehicles to safely take the turn, reducing reliance on friction.","For ideal banking (no friction needed): $\\tan\\theta = v^2/(rg)$ where $\\theta$ is the banking angle, $v$ is the design speed, $r$ is the radius of the curve.","If friction is present, the safe speed range becomes: $v_{\\max} = \\sqrt{rg(\\mu + \\tan\\theta)/(1 - \\mu\\tan\\theta)}$ and $v_{\\min} = \\sqrt{rg(\\mu - \\tan\\theta)/(1 + \\mu\\tan\\theta)}$.","On a banked road without friction, a vehicle at design speed can take the turn without any tendency to skid."],formulas:[{label:"Ideal banking angle",latex:"$$\\tan\\theta = \\frac{v^2}{rg}$$"},{label:"Max speed on banked road (with friction)",latex:"$$v_{\\max} = \\sqrt{\\frac{rg(\\mu + \\tan\\theta)}{1 - \\mu\\tan\\theta}}$$"},{label:"Max speed on unbanked road",latex:"$$v_{\\max} = \\sqrt{\\mu rg}$$"}],tips:["Banking angle depends on design speed and radius — it does NOT depend on the mass of the vehicle.","Railway tracks are also banked at curves — same principle applies."]},{id:"vertical-circle",title:"Vertical Circular Motion",content:["When a body moves in a vertical circle (e.g., a bucket of water whirled vertically, a roller coaster loop), the speed changes because of gravity.","At the topmost point: $T + mg = mv^2/r$. The tension is minimum at the top. For the body to just complete the circle, tension at the top can be zero: $v_{\\text{top}} = \\sqrt{gr}$.","At the bottommost point: $T - mg = mv^2/r$. The tension is maximum at the bottom.","The minimum velocity at the bottom to complete the vertical circle: $v_{\\min} = \\sqrt{5gr}$.","**Condition for completing the circle:** The body must have sufficient velocity at the lowest point such that the string (or rod) doesn't slack at the top.","For a rod (not a string): the body doesn't need to maintain tension — the rod can push. So $v_{\\min}$ at the bottom = $\\sqrt{4gr}$."],formulas:[{label:"Min velocity at top (string)",latex:"$$v_{\\text{top}} = \\sqrt{gr}$$"},{label:"Min velocity at bottom (string)",latex:"$$v_{\\min} = \\sqrt{5gr}$$"},{label:"Min velocity at bottom (rod)",latex:"$$v_{\\min} = \\sqrt{4gr}$$"},{label:"Velocity at any point",latex:"$$v = \\sqrt{v_0^2 - 2gh + 2gr}$$"}],tips:["Tension is maximum at the bottom, minimum at the top. $T_{\\text{bottom}} - T_{\\text{top}} = 6mg$.","For water to not spill from a bucket whirled vertically: $v \\geq \\sqrt{gr}$ at the top."]},{id:"moment-of-inertia",title:"Moment of Inertia",content:["**Moment of Inertia ($I$)** is the rotational analogue of mass. It measures the resistance of a body to angular acceleration. $I = \\sum mr^2$ (sum of product of mass and square of distance from axis).","**Standard formulas (memorize for VITEEE):**","- Rod about center (⊥): $I = ML^2/12$","- Rod about end (⊥): $I = ML^2/3$","- Ring/Disc about axis (⊥, through center): $I = MR^2$ (ring), $I = MR^2/2$ (disc)","- Solid sphere: $I = 2MR^2/5$","- Hollow sphere/thin shell: $I = 2MR^2/3$","- Solid cylinder about axis: $I = MR^2/2$"],formulas:[{label:"Definition",latex:"$$I = \\sum mr^2 = \\int r^2 \\, dm$$"},{label:"Parallel Axis Theorem",latex:"$$I = I_{\\text{cm}} + Md^2$$"},{label:"Perpendicular Axis Theorem",latex:"$$I_z = I_x + I_y$$"},{label:"Rod (center)",latex:"$$I = \\frac{ML^2}{12}$$"},{label:"Disc (about axis)",latex:"$$I = \\frac{MR^2}{2}$$"},{label:"Solid sphere",latex:"$$I = \\frac{2MR^2}{5}$$"},{label:"Hollow sphere",latex:"$$I = \\frac{2MR^2}{3}$$"}],tips:["Parallel axis theorem: used when the axis is parallel to a known axis through CM. d = distance between axes.","Perpendicular axis theorem: only valid for planar (2D) bodies.","VITEEE almost always has a question on moment of inertia of standard bodies."]},{id:"torque-angular-momentum",title:"Torque & Angular Momentum",content:["**Torque ($\\tau$):** The rotational analogue of force. It is the turning effect of a force about an axis. $\\tau = \\vec{r} \\times \\vec{F} = rF\\sin\\theta$.","Newton's second law for rotation: $\\tau = I\\alpha$ (analogous to $F = ma$).","**Angular Momentum ($L$):** The rotational analogue of linear momentum. $L = I\\omega = \\vec{r} \\times \\vec{p} = mvr\\sin\\theta$.","Conservation of angular momentum: When net external torque = 0, $L$ is conserved: $I_1\\omega_1 = I_2\\omega_2$.","Applications of angular momentum conservation: spinning ice skater (arms in = faster spin), diver tucking (faster rotation), planetary motion."],formulas:[{label:"Torque",latex:"$$\\tau = I\\alpha$$"},{label:"Angular momentum",latex:"$$L = I\\omega$$"},{label:"Conservation",latex:"$$I_1\\omega_1 = I_2\\omega_2 \\quad (\\text{when } \\tau_{\\text{ext}} = 0)$$"},{label:"Rotational kinetic energy",latex:"$$KE = \\frac{1}{2}I\\omega^2$$"},{label:"Work in rotation",latex:"$$W = \\tau \\cdot \\theta$$"}],tips:["Angular momentum $L = mvr$ for a particle moving in a circle of radius r.","A spinning skater pulls arms in: I decreases → ω increases (L is conserved).","Relation $L = I\\omega$ is the rotational analogue of $p = mv$."]},{id:"rolling-motion",title:"Rolling Motion",content:["**Rolling without slipping:** A body rolls when it rotates about an axis while the point of contact has zero instantaneous velocity. The condition is $v = R\\omega$ (translational velocity equals $R$ times angular velocity).","Rolling can be thought of as pure translation + pure rotation about the center of mass.","**Total Kinetic Energy in rolling:** $KE_{\\text{total}} = KE_{\\text{trans}} + KE_{\\text{rot}} = \\frac{1}{2}mv^2 + \\frac{1}{2}I\\omega^2$.","Using $I = Mk^2$ (where $k$ is the radius of gyration): $KE_{\\text{total}} = \\frac{1}{2}mv^2(1 + k^2/R^2)$.","**Acceleration down an incline:** $a = \\frac{g\\sin\\theta}{1 + k^2/R^2}$. This depends on the shape of the rolling body.","Order of rolling speed down an incline (fastest to slowest): Ring ($k = R$) < Disc ($k = R/\\sqrt{2}$) < Solid Sphere ($k = \\sqrt{2/5}R$)."],formulas:[{label:"Rolling condition",latex:"$$v = R\\omega, \\quad a = R\\alpha$$"},{label:"Total KE",latex:"$$KE_{\\text{total}} = \\frac{1}{2}mv^2\\left(1 + \\frac{k^2}{R^2}\\right)$$"},{label:"Acceleration down incline",latex:"$$a = \\frac{g\\sin\\theta}{1 + I/(mR^2)}$$"}],tips:["A sphere rolls faster than a disc, which rolls faster than a ring down the same incline (lower $k^2/R^2$ → higher acceleration).","For pure rolling: the point of contact has zero velocity, the topmost point has velocity $2v$.","Friction is necessary for rolling but does NO work (point of contact is instantaneously at rest)."]}]},{slug:"oscillations",title:"Oscillations",description:"Simple harmonic motion, pendulums, springs, damped & forced vibrations, resonance.",icon:"Activity",color:"#8b5cf6",sections:[{id:"types-motion-shm",title:"Types of Motion & SHM Conditions",content:["**Periodic Motion:** Motion that repeats itself at regular intervals of time. Example: Revolution of Earth around Sun.","**Oscillatory Motion:** A type of periodic motion where the body moves to and fro about a fixed position (equilibrium position). Example: Motion of a pendulum, a spring-mass system.","**Simple Harmonic Motion (SHM):** A special type of oscillatory motion where the restoring force is directly proportional to the displacement from equilibrium and acts in the opposite direction.","Mathematical conditions for SHM:","- Force condition: $F = -ky$ (restoring force proportional to displacement)","- Differential equation: $\\frac{d^2y}{dt^2} + \\omega^2 y = 0$ (acceleration proportional to displacement, directed toward equilibrium)"],formulas:[{label:"SHM force condition",latex:"$$F = -ky$$"},{label:"SHM differential equation",latex:"$$\\frac{d^2y}{dt^2} + \\omega^2 y = 0$$"}],tips:["All SHM is oscillatory and periodic, but not all periodic motion is SHM.","The angular frequency $\\omega$ depends on the system (mass, spring constant, length of pendulum) but NOT on amplitude."]},{id:"shm-parameters",title:"SHM Parameters & Equations",content:["**Displacement:** $x = A\\sin(\\omega t + \\phi)$ where $A$ is amplitude, $\\omega$ is angular frequency, and $\\phi$ is the initial phase (epoch).","**Velocity:** $v = \\omega\\sqrt{A^2 - x^2}$. Maximum velocity $v_{\\max} = \\omega A$ at the mean position ($x = 0$). At extreme positions ($x = \\pm A$), $v = 0$.","**Acceleration:** $a = -\\omega^2 x$. Maximum acceleration $a_{\\max} = \\omega^2 A$ at extreme positions. At mean position, $a = 0$.","**Phase:** $(\\omega t + \\phi)$ determines the state of motion at any instant. Phase difference of $2\\pi$ (or $0$) means same state; $\\pi$ means opposite state.","**Time Period ($T$):** Time for one complete oscillation. $T = 2\\pi/\\omega$. **Frequency ($f$):** Number of oscillations per second. $f = 1/T = \\omega/(2\\pi)$."],formulas:[{label:"Displacement",latex:"$$x = A\\sin(\\omega t + \\phi)$$"},{label:"Velocity",latex:"$$v = \\omega\\sqrt{A^2 - x^2}$$"},{label:"Acceleration",latex:"$$a = -\\omega^2 x$$"},{label:"Time period (spring)",latex:"$$T = 2\\pi\\sqrt{\\frac{m}{k}}$$"},{label:"Time period (pendulum)",latex:"$$T = 2\\pi\\sqrt{\\frac{l}{g}}$$"}],tips:["At mean position: $v$ is maximum, $a = 0$, KE is maximum, PE is minimum.","At extreme position: $v = 0$, $a$ is maximum, KE = 0, PE is maximum.","SHM is isochronous — time period does NOT depend on amplitude."]},{id:"shm-energy",title:"Energy in SHM",content:["The total energy in SHM is constant (conserved). It is the sum of kinetic energy and potential energy, and it depends on amplitude and angular frequency but NOT on the instantaneous position.","**Total Energy:** $E = \\frac{1}{2}m\\omega^2 A^2 = \\frac{1}{2}kA^2$ (constant).","**Kinetic Energy:** $KE = \\frac{1}{2}m\\omega^2(A^2 - x^2)$. Maximum at mean position ($x = 0$), zero at extremes.","**Potential Energy:** $PE = \\frac{1}{2}m\\omega^2 x^2$. Maximum at extremes ($x = \\pm A$), zero at mean position.","At all times: $KE + PE = E = \\text{constant}$. The energy oscillates between KE and PE, but total remains the same.","The average KE over one complete cycle = average PE over one complete cycle = $E/2$."],formulas:[{label:"Total energy",latex:"$$E = \\frac{1}{2}m\\omega^2 A^2$$"},{label:"Kinetic energy",latex:"$$KE = \\frac{1}{2}m\\omega^2(A^2 - x^2)$$"},{label:"Potential energy",latex:"$$PE = \\frac{1}{2}m\\omega^2 x^2$$"},{label:"Average KE = Average PE",latex:"$$\\overline{KE} = \\overline{PE} = \\frac{E}{2} = \\frac{1}{4}m\\omega^2 A^2$$"}],tips:["KE and PE both vary sinusoidally with time, but they are 90° out of phase with each other.","The frequency of energy oscillation is TWICE the frequency of displacement oscillation."]},{id:"spring-combinations",title:"Spring Combinations",content:["When multiple springs are connected, they can be combined into an equivalent single spring.","**Parallel Combination:** The equivalent spring constant is the sum of individual constants. The displacement is the same for all springs, but forces add up.","**Series Combination:** The reciprocal of equivalent spring constant equals the sum of reciprocals. The force is the same through all springs, but displacements add up.","Note: Parallel combination gives a stiffer spring (larger $k_{eq}$), series gives a softer spring (smaller $k_{eq}$)."],formulas:[{label:"Parallel springs",latex:"$$k_{eq} = k_1 + k_2$$"},{label:"Series springs",latex:"$$\\frac{1}{k_{eq}} = \\frac{1}{k_1} + \\frac{1}{k_2}$$"},{label:"Time period (parallel)",latex:"$$T = 2\\pi\\sqrt{\\frac{m}{k_1 + k_2}}$$"},{label:"Time period (series)",latex:"$$T = 2\\pi\\sqrt{\\frac{m(k_1 + k_2)}{k_1 k_2}}$$"}],tips:["Cutting a spring into n equal parts: each part has spring constant $nk$. So $T_{\\text{part}} = T_{\\text{original}}/\\sqrt{n}$.","For a spring with mass $m_s$ (not massless): $T = 2\\pi\\sqrt{(M + m_s/3)/k}$."]},{id:"simple-pendulum",title:"Simple Pendulum",content:["A simple pendulum consists of a point mass suspended by a massless, inextensible string from a fixed support. For small angular displacements ($\\theta < 15°$), it executes SHM.","Time period: $T = 2\\pi\\sqrt{l/g}$ — depends on length and $g$, but NOT on mass or amplitude (for small oscillations).","**Laws of Simple Pendulum:**","1. Law of length: $T \\propto \\sqrt{l}$ (at constant $g$)","2. Law of gravity: $T \\propto 1/\\sqrt{g}$ (at constant $l$)","3. Law of mass: $T$ is independent of mass","**Seconds pendulum:** A pendulum with $T = 2$ seconds. Its length: $l = g/\\pi^2 \\approx 0.99$ m.","At height $h$: $g' = g(1 - 2h/R)$, so $T' = T/\\sqrt{(1 - 2h/R)}$. As height increases, $g$ decreases and $T$ increases."],formulas:[{label:"Time period",latex:"$$T = 2\\pi\\sqrt{\\frac{l}{g}}$$"},{label:"Seconds pendulum",latex:"$$T = 2s \\implies l = \\frac{g}{\\pi^2} \\approx 0.99 \\text{ m}$$"},{label:"Effect of lift (up, accel. a)",latex:"$$T' = 2\\pi\\sqrt{\\frac{l}{g + a}}$$"}],tips:["A pendulum clock slows down in summer (l increases with temperature) and at higher altitudes (g decreases).","In a freely falling lift ($a = g$): $T \\to \\infty$ (pendulum stops oscillating).","In an accelerating lift going up: effective $g$ increases, so $T$ decreases."]},{id:"damped-forced-vibrations",title:"Damped & Forced Vibrations",content:["**Damped Vibrations:** When a body oscillates in a resistive medium (like air or liquid), its amplitude gradually decreases due to energy dissipation.","- **Underdamped:** Amplitude decreases slowly, oscillation continues for many cycles. System oscillates with frequency slightly less than natural frequency.","- **Critically damped:** System returns to equilibrium in the shortest time without oscillating. Used in shock absorbers, door closers.","- **Overdamped:** System returns to equilibrium very slowly without oscillating.","**Forced Vibrations:** When an external periodic force is applied to a vibrating body, it vibrates with the frequency of the applied force (NOT its natural frequency).","**Resonance:** When the frequency of the driving force equals the natural frequency of the body, the amplitude becomes very large (theoretically infinite without damping). Resonance can be useful (tuning a radio) or destructive (Tacoma Narrows Bridge collapse)."],formulas:[{label:"Damped angular frequency",latex:"$$\\omega' = \\sqrt{\\omega_0^2 - \\beta^2}$$"},{label:"Amplitude at resonance",latex:"$$A_{\\text{max}} = \\frac{F_0}{2m\\beta\\omega_0}$$"}],tips:["At resonance, amplitude is maximum. This is why soldiers break step while crossing a bridge.","Critical damping is ideal for car suspension — returns to equilibrium quickly without bouncing.","VITEEE may ask about the conditions for resonance and damping."]}]},{slug:"waves-sound",title:"Waves & Sound Waves",description:"Wave equation, interference, standing waves, beats, Doppler effect, organ pipes.",icon:"Radio",color:"#06b6d4",sections:[{id:"wave-equation-speed",title:"Wave Equation & Wave Speed",content:["A **wave** is a disturbance that transfers energy from one point to another without transferring matter. Waves can be transverse (particles oscillate ⊥ to wave direction) or longitudinal (particles oscillate ∥ to wave direction).","**Wave Equation:** $\\frac{d^2y}{dt^2} = v^2\\frac{d^2y}{dx^2}$ — this is the general wave equation. Any function satisfying this represents a wave.","**Wave Speed:** Depends on the properties of the medium, NOT on the frequency or amplitude of the wave.","- Transverse wave on a string: $v = \\sqrt{T/\\mu}$ where $T$ = tension, $\\mu$ = mass per unit length","- Longitudinal wave (sound) in a solid: $v = \\sqrt{Y/\\rho}$ where $Y$ = Young's modulus","- Sound in a liquid: $v = \\sqrt{B/\\rho}$ where $B$ = Bulk modulus","- Sound in a gas: $v = \\sqrt{\\gamma P/\\rho}$ where $\\gamma$ = adiabatic index"],formulas:[{label:"General wave equation",latex:"$$\\frac{d^2y}{dt^2} = v^2\\frac{d^2y}{dx^2}$$"},{label:"Wave speed",latex:"$$v = f\\lambda = \\frac{\\omega}{k} = \\frac{\\lambda}{T}$$"},{label:"Transverse wave on string",latex:"$$v = \\sqrt{\\frac{T}{\\mu}}$$"},{label:"Sound in gas",latex:"$$v = \\sqrt{\\frac{\\gamma P}{\\rho}}$$"},{label:"Sound in solid",latex:"$$v = \\sqrt{\\frac{Y}{\\rho}}$$"}],tips:["Wave speed depends only on medium properties. Changing frequency or amplitude does NOT change the speed.","In a gas: $v \\propto \\sqrt{T}$ (absolute temperature). Sound travels faster in warm air than cold air."]},{id:"progressive-wave",title:"Progressive Wave",content:["A **progressive (traveling) wave** moves through the medium, transferring energy. For a wave traveling in the +x direction: $y = A\\sin(\\omega t - kx)$.","**Wave parameters:**","- Amplitude ($A$): Maximum displacement from equilibrium","- Wavelength ($\\lambda$): Distance between two consecutive identical points","- Frequency ($f$): Number of complete oscillations per second","- Time period ($T$): Time for one complete oscillation ($T = 1/f$)","- Wave number ($k$): $k = 2\\pi/\\lambda$ (number of wavelengths per unit distance)","- Angular frequency ($\\omega$): $\\omega = 2\\pi f = 2\\pi/T$","For a wave traveling in −x direction: $y = A\\sin(\\omega t + kx)$."],formulas:[{label:"Progressive wave (+x direction)",latex:"$$y = A\\sin(\\omega t - kx)$$"},{label:"Wave number",latex:"$$k = \\frac{2\\pi}{\\lambda}$$"},{label:"Angular frequency",latex:"$$\\omega = 2\\pi f = \\frac{2\\pi}{T}$$"}],tips:["The sign convention: $-kx$ means wave moves in +x, $+kx$ means wave moves in −x.","Phase difference $\\Delta\\phi = k\\Delta x = \\frac{2\\pi}{\\lambda}\\Delta x$. Path difference $\\Delta x = \\frac{\\lambda}{2\\pi}\\Delta\\phi$."]},{id:"interference",title:"Interference of Waves",content:["**Interference** is the superposition of two or more coherent waves (same frequency and constant phase difference). Constructive interference occurs when waves meet in phase; destructive when out of phase.","**Resultant amplitude:** $A = \\sqrt{a_1^2 + a_2^2 + 2a_1a_2\\cos\\phi}$ where $a_1, a_2$ are individual amplitudes and $\\phi$ is the phase difference.","**Constructive interference** (maximum amplitude): $\\phi = 0, 2\\pi, 4\\pi...$ (path difference = $n\\lambda$). Resultant: $A = a_1 + a_2$.","**Destructive interference** (minimum amplitude): $\\phi = \\pi, 3\\pi, 5\\pi...$ (path difference = $(2n+1)\\lambda/2$). Resultant: $A = |a_1 - a_2|$.","For equal amplitudes ($a_1 = a_2 = a$): $A = 2a\\cos(\\phi/2)$, and $I = 4I_0\\cos^2(\\phi/2)$."],formulas:[{label:"Resultant amplitude",latex:"$$A = \\sqrt{a_1^2 + a_2^2 + 2a_1a_2\\cos\\phi}$$"},{label:"For equal amplitudes",latex:"$$I = 4I_0\\cos^2\\frac{\\phi}{2}$$"}],tips:["Coherent sources are required for sustained interference. Two independent sources are generally NOT coherent.","Constructive: path diff = $n\\lambda$; Destructive: path diff = $(n + 1/2)\\lambda$ ($n = 0, 1, 2...$)."]},{id:"stationary-waves",title:"Stationary (Standing) Waves",content:["**Stationary waves** are formed by the superposition of two identical progressive waves traveling in opposite directions. The wave profile does not move — energy is trapped between nodes.","Equation: $y = 2a\\cos(kx)\\sin(\\omega t)$. Nodes: $\\cos(kx) = 0$ → $kx = (2n+1)\\pi/2$. Antinodes: $\\cos(kx) = \\pm 1$ → $kx = n\\pi$.","**Nodes:** Points of zero amplitude (always at rest). Distance between consecutive nodes = $\\lambda/2$.","**Antinodes:** Points of maximum amplitude. Distance between consecutive antinodes = $\\lambda/2$. Nodes and antinodes alternate.","**String fixed at both ends:** All harmonics are present. $f_n = nv/(2L)$, $n = 1, 2, 3...$ Fundamental: $f_1 = v/(2L)$."],formulas:[{label:"Standing wave equation",latex:"$$y = 2a\\cos(kx)\\sin(\\omega t)$$"},{label:"String (both ends fixed)",latex:"$$f_n = \\frac{nv}{2L}, \\quad n = 1, 2, 3, \\ldots$$"},{label:"Distance between nodes",latex:"$$\\text{Node spacing} = \\frac{\\lambda}{2}$$"}],tips:["In standing waves, energy oscillates between KE and PE but doesn't propagate.","Only odd harmonics are present in a pipe closed at one end; all harmonics in an open pipe."]},{id:"beats",title:"Beats",content:["**Beats** are periodic variations in the intensity of sound when two sound waves of slightly different frequencies are superposed. The beat frequency equals the difference of the individual frequencies.","Beat frequency: $f_{\\text{beat}} = |f_1 - f_2|$. The amplitude varies at the beat frequency.","Beats are heard as a periodic waxing and waning of sound. If $f_1 = 256$ Hz and $f_2 = 260$ Hz, you hear 4 beats per second.","Beats can be used to tune musical instruments: when zero beats are heard, the instrument is perfectly in tune with the reference.","Maximum number of beats audible to human ear: about 10 per second (beyond this, the ear perceives them as separate tones)."],formulas:[{label:"Beat frequency",latex:"$$f_{\\text{beat}} = |f_1 - f_2|$$"}],tips:["If beat frequency increases when a wax load is added to one tuning fork, its frequency was originally higher.","Beats are an example of interference — they arise from the constructive and destructive superposition of waves."]},{id:"sound-properties",title:"Properties of Sound",content:["Sound is a longitudinal mechanical wave that requires a medium for propagation. It cannot travel through vacuum.","**Intensity ($I$):** Sound energy flowing per unit area per unit time (W/m²). $I \\propto A^2$ (proportional to square of amplitude). $I \\propto 1/r^2$ (inverse square law for point source).","**Loudness:** The subjective perception of intensity. Measured in decibels (dB): $\\beta = 10\\log(I/I_0)$ where $I_0 = 10^{-12}$ W/m² (threshold of hearing).","**Pitch:** Depends on frequency — higher frequency = higher pitch. **Timbre:** Quality that distinguishes sounds of same pitch and loudness (depends on overtones).","**Velocity of Sound:**","- In solid: $v = \\sqrt{Y/\\rho}$ (Young's modulus / density)","- In liquid: $v = \\sqrt{B/\\rho}$ (Bulk modulus / density)","- In gas: $v = \\sqrt{\\gamma P/\\rho}$. Also $v \\propto \\sqrt{T}$ where $T$ is in Kelvin."],formulas:[{label:"Intensity",latex:"$$I = \\frac{P}{4\\pi r^2} \\propto A^2 \\propto \\frac{1}{r^2}$$"},{label:"Intensity level (dB)",latex:"$$\\beta = 10\\log\\frac{I}{I_0}$$"},{label:"Velocity in gas",latex:"$$v = \\sqrt{\\frac{\\gamma P}{\\rho}}$$"}],tips:["Sound travels fastest in solids, slower in liquids, slowest in gases.","At 0°C in air: $v \\approx 331$ m/s. At 20°C: $v \\approx 343$ m/s. Increase of about 0.6 m/s per °C."]},{id:"organ-pipes",title:"Musical Instruments & Organ Pipes",content:["**Organ pipes** produce sound by vibrating air columns. They are of two types:","**Open Pipe (open at both ends):** Antinode at both ends. All harmonics are present: $f_n = nv/(2L)$, $n = 1, 2, 3, \\ldots$","Fundamental (1st harmonic): $f_1 = v/(2L)$, wavelength = $2L$ (one antinode in the middle, nodes at the ends — wait, antinodes at
